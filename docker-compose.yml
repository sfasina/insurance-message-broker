
services:
  kafka:
    image: apache/kafka:4.2.0 
    ports: 
      - "9092:9092"
    environment:
      KAFKA_NODE_ID=1
      KAFKA_PROCESS_ROLES=broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXTU

  kafka-ui:
    image: provectuslabs/kafka-ui:latest 
    ports: 
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-insurance
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka
  

